<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Qua Equipamientos</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #1d1d1f;
      --muted: #6b6b6b;
      --card: #f7f7f7;
      --ring: rgba(0,0,0,0.08);
    }
    [data-theme="dark"] {
      --bg: #0e0e10;
      --text: #e6e6e6;
      --muted: #a3a3a3;
      --card: #1a1a1a;
      --ring: rgba(255,255,255,0.08);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial;
      color: var(--text);
      background: var(--bg);
    }

    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      gap: 12px;
      backdrop-filter: saturate(1.2) blur(6px);
      background: color-mix(in srgb, var(--bg) 70%, transparent);
      z-index: 50;
      border-bottom: 1px solid var(--ring);
    }

    .nav { display: flex; gap: 18px; align-items: center; flex-wrap: wrap; }
    .nav-link { color: var(--text); text-decoration: none; font-size: 14px; padding: 8px 6px; border-radius: 6px; transition: opacity .2s ease; }
    .nav-link:hover { opacity: .7; }
    .nav-link[aria-current="page"] { font-weight: 600; text-decoration: underline; text-underline-offset: 4px; }

    .theme-toggle {
      background: transparent; border: 1px solid var(--ring);
      color: var(--text); border-radius: 999px; padding: 8px 12px; font-size: 14px;
      cursor: pointer; display: inline-flex; align-items: center; gap: 8px; flex-shrink: 0;
    }

    .container { padding: 92px 20px 24px; max-width: 900px; margin: 0 auto; text-align: center; }
    h1 { font-size: 32px; margin-bottom: 6px; letter-spacing: -0.01em; }
    .lead { color: var(--muted); margin-bottom: 8px; font-size: 18px; }
    .section-hint { color: var(--muted); font-size: 13px; margin-top: 4px; }
    .card { background: var(--card); border-radius: 12px; padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }

    .map-container {
      width: 100%; height: 400px; border: 1px solid var(--ring);
      border-radius: 12px; overflow: hidden; margin-top: 16px;
    }
    iframe { width: 100%; height: 100%; border: 0; filter: grayscale(0.2); }

    .footer {
      text-align: center;
      color: var(--muted);
      font-size: 11px;
      padding: 8px 16px 32px;
    }

    @media (max-width: 600px) {
      h1 { font-size: 26px; }
      .header { height: 56px; padding: 0 12px; gap: 8px; }
      .nav { gap: 10px; }
      .nav-link { font-size: 13px; padding: 6px 4px; }
      .theme-toggle { padding: 6px 10px; font-size: 13px; }
      .container { padding: 80px 16px 16px; }
      .lead { font-size: 15px; }
    }
    @media (max-width: 380px) {
      .theme-toggle span:last-child { display: none; }
    }
  </style>
</head>
<body>
  <header class="header">
    <nav class="nav">
      <a href="index.html" class="nav-link">Inicio</a>
      <a href="servicios.html" class="nav-link">Servicios</a>
      <a href="contacto.html" class="nav-link">Contacto</a>
      <a href="ubicacion.html" class="nav-link" aria-current="page">Ejemplares</a>
    </nav>

    <button id="themeToggle" class="theme-toggle">
      <span id="themeIcon">🌙</span>
      <span id="themeText">Modo oscuro</span>
    </button>
  </header>

  <main class="container">
    <h1>Ejemplares</h1>
    <p class="lead">¿Querés guiarte? Te dejamos algunos proyectos.</p>
    <p class="section-hint">Tocá una imagen para ampliarla.</p>
 </main>

<div id="overlay" class="overlay-fondo"></div>

<div class="galeria-pirata">
  <img src="ejemplares/1.png" class="img-item" alt="foto 1">
  <img src="ejemplares/2.png" class="img-item" alt="foto 2">
</div>

<style>
  .galeria-pirata {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 14px;
    padding: 16px 20px 24px;
    max-width: 900px;
    margin: 0 auto;
  }

  .img-item {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    border-radius: 14px;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    border: 1px solid var(--ring);
  }
  .img-item:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(0,0,0,0.08); }

  .img-item.grande {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: auto;
    height: auto;
    max-width: 92vw;
    max-height: 88vh;
    aspect-ratio: auto;
    z-index: 9999;
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
    object-fit: contain;
    border: none;
    border-radius: 12px;
  }

  .overlay-fondo {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.8);
    z-index: 9998;
    backdrop-filter: blur(5px);
  }
  .overlay-fondo.activo { display: block; }

  @media (max-width: 600px) {
    .galeria-pirata {
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      padding: 12px 16px 20px;
    }
    .img-item { border-radius: 12px; }
  }
</style>

<script>
  const overlay = document.getElementById('overlay');
  const imagenes = document.querySelectorAll('.img-item');

  function cerrarTodo() {
    imagenes.forEach(i => i.classList.remove('grande'));
    overlay.classList.remove('activo');
  }

  imagenes.forEach(img => {
    img.addEventListener('click', (e) => {
      e.stopPropagation();
      if (!img.classList.contains('grande')) {
        cerrarTodo();
        img.classList.add('grande');
        overlay.classList.add('activo');
      } else {
        cerrarTodo();
      }
    });
  });

  // cerrar al tocar el fondo oscuro
  overlay.addEventListener('click', cerrarTodo);

  // cerrar con la tecla escape
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') cerrarTodo();
  });
</script>

  <script>
    const btn = document.getElementById('themeToggle');
    const html = document.documentElement;
    const txt = document.getElementById('themeText');
    const icon = document.getElementById('themeIcon');

    // la papa: función única para cambiar todo de una
    function setTheme(theme) {
      html.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
      if (theme === 'dark') {
        txt.textContent = 'Modo claro';
        icon.textContent = '☀️';
      } else {
        txt.textContent = 'Modo oscuro';
        icon.textContent = '🌙';
      }
    }

    // leer qué hay guardado apenas carga
    const saved = localStorage.getItem('theme') || 'light';
    setTheme(saved);

    // el evento del click sin vueltas
    btn.addEventListener('click', () => {
      const target = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      setTheme(target);
    });
  </script>
  <footer class="footer">© 2026 QuaCocina</footer>
</body>
</html>
